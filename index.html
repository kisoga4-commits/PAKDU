<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#800000">
    <title>FAKDU v8.31 - เครื่องแม่</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #800000; }
        body { font-family: 'Prompt', sans-serif; background: #0f172a; margin: 0; user-select: none; }
        .app-container { max-width: 480px; margin: 0 auto; background: #0f172a; min-height: 100vh; overflow-x: hidden; box-shadow: 0 0 60px rgba(0,0,0,0.6); }
        
        .glass-header { background: linear-gradient(180deg, #800000, #5c0000); position: sticky; top: 0; z-index: 100; padding-top: env(safe-area-inset-top); }
        .header-main { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
        .logo-box { position: relative; width: 88px; height: 88px; }
        .shop-img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .status-dot { width: 22px; height: 22px; border-radius: 50%; border: 4px solid #800000; position: absolute; top: -4px; right: -4px; z-index: 20; }
        .st-on { background: #22c55e; box-shadow: 0 0 15px #22c55e; }
        .st-off { background: #ef4444; }
        .st-sync { background: #f59e0b; animation: pulse 1.2s infinite; }
        
        .top-nav { background: white; display: flex; height: 58px; position: sticky; top: 88px; z-index: 90; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .nav-tab { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 900; color: #475569; }
        .nav-tab.active { color: #800000; border-bottom: 5px solid #800000; }
        
        .screen { padding: 20px; flex: 1; overflow-y: auto; }
        .unit-card { aspect-ratio: 1; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 42px; font-weight: 900; cursor: pointer; background: #1e2937; border: 3px solid #334155; }
        .unit-busy { background: linear-gradient(135deg, #f59e0b, #d97706); border-color: #f59e0b; color: white; }
        .unit-pending { background: #1e40af; border-color: #3b82f6; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.95); z-index: 99999; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .modal-compact { background: white; color: #0f172a; width: 88%; max-width: 340px; border-radius: 28px; padding: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        #loading-screen { position: fixed; inset: 0; background: #0f172a; z-index: 999999; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; padding: 14px 24px; border-radius: 9999px; font-weight: 800; opacity: 0; transition: all 0.3s; }
        #toast.show { opacity: 1; bottom: 40px; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-container">

    <!-- LOADING SCREEN (F5 Safe) -->
    <div id="loading-screen">
        <div class="text-5xl font-black mb-6 animate-pulse">FAKDU</div>
        <div class="text-sm font-bold tracking-widest">กำลังโหลดฐานข้อมูลเครื่องแม่...</div>
    </div>

    <!-- HEADER -->
    <div class="glass-header">
        <div class="header-main">
            <div class="logo-box">
                <img id="shop-logo" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHJlY3Qgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiBmaWxsPSIjYmJiYmJiIi8+PC9zdmc+" class="shop-img">
                <div id="status-dot" class="status-dot st-off"></div>
            </div>
            <div id="trial-badge" onclick="openProModal()" class="bg-yellow-400 text-black px-6 py-2 rounded-full font-black text-sm shadow-xl cursor-pointer">รุ่นทดลอง</div>
            <button onclick="openSyncModal()" class="w-12 h-12 bg-white/20 rounded-2xl text-3xl active:scale-90">📱</button>
        </div>
    </div>

    <!-- NAV -->
    <div class="top-nav">
        <div class="nav-tab active" onclick="switchTab('customer',this)">👨‍👩‍👦 ลูกค้า</div>
        <div class="nav-tab" onclick="switchTab('shop',this)">🧾 เช็คบิล</div>
        <div class="nav-tab" onclick="attemptAdmin('manage',this)">📊 หลังร้าน</div>
        <div class="nav-tab" onclick="attemptAdmin('system',this)">⚙️ ระบบ</div>
    </div>

    <!-- SCREENS -->
    <div id="screen-customer" class="screen active">
        <h2 class="text-3xl font-black mb-6">เลือก <span class="lbl-unit">โต๊ะ</span></h2>
        <div id="grid-units" class="grid grid-cols-3 gap-4"></div>
    </div>

    <div id="screen-order" class="screen hidden bg-[#1e2937]">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="switchTab('customer')" class="bg-white text-black px-5 py-3 rounded-2xl font-black">← กลับ</button>
            <h2 class="font-black text-3xl"><span class="icon-unit">🍽️</span> <span id="active-unit-id" class="text-yellow-300"></span></h2>
        </div>
        <div id="popular-items" class="flex gap-4 overflow-x-auto pb-4"></div>
        <div id="item-grid" class="space-y-4 mt-6"></div>
        
        <div class="fixed bottom-0 inset-x-0 max-w-[480px] mx-auto bg-white text-black p-6 shadow-2xl rounded-t-3xl">
            <div class="flex justify-between">
                <div>
                    <span class="text-xs font-bold text-gray-500">ในตะกร้า</span>
                    <span id="cart-count" class="text-2xl font-black text-[#800000]">0</span>
                </div>
                <div class="text-4xl font-black">฿<span id="cart-total">0</span></div>
                <button onclick="reviewOrderNow()" class="bg-[#800000] text-white px-10 py-4 rounded-2xl font-black text-lg">ตรวจสอบ 📝</button>
            </div>
        </div>
    </div>

    <div id="screen-shop" class="screen hidden">
        <h2 class="text-3xl font-black mb-6">🧾 คิวค้างชำระ</h2>
        <div id="shop-queue-list" class="space-y-4"></div>
    </div>

    <div id="screen-manage" class="screen hidden">
        <div class="flex bg-[#1e2937] p-1 rounded-3xl mb-6">
            <div onclick="switchSub('dash',this)" class="dash-tab flex-1 text-center py-4 rounded-3xl font-black text-lg active">📊 ยอดขาย</div>
            <div onclick="switchSub('menu',this)" class="dash-tab flex-1 text-center py-4 rounded-3xl font-black text-lg">📦 จัดการร้าน</div>
        </div>
        <div id="sub-dash"></div>
        <div id="sub-menu" class="hidden"></div>
    </div>

    <div id="screen-system" class="screen hidden p-6">
        <h2 class="text-3xl font-black mb-8">ตั้งค่าระบบ</h2>
        <div class="bg-white text-black rounded-3xl p-6 space-y-6">
            <input id="sys-shop-name" type="text" placeholder="ชื่อร้าน" class="w-full p-5 rounded-3xl border-2">
            <button onclick="saveSystemSettings()" class="w-full bg-[#800000] text-white py-5 rounded-3xl font-black text-xl">💾 บันทึก</button>
        </div>
    </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-review">
    <div class="modal-compact">
        <h2 class="text-3xl font-black text-center mb-6"><span class="icon-unit">🍽️</span> <span id="review-id-view"></span></h2>
        <div id="review-items-box" class="max-h-64 overflow-auto text-sm"></div>
        <div class="text-4xl font-black text-right mt-6">฿<span id="review-total-val">0</span></div>
        <div class="flex gap-4 mt-8">
            <button onclick="closeModal('modal-review')" class="flex-1 py-4 rounded-2xl bg-gray-200 font-black">แก้ไข</button>
            <button onclick="sendOrderToKitchen()" class="flex-[2] py-4 rounded-2xl bg-emerald-500 text-white font-black text-xl">ส่งออร์เดอร์ 🚀</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-checkout">
    <div class="modal-compact">
        <h2 class="text-3xl font-black text-center">เช็คบิลโต๊ะ <span id="checkout-id-view" class="text-yellow-400"></span></h2>
        <div id="checkout-items-box" class="my-6"></div>
        <div class="text-5xl font-black text-center mb-6">฿<span id="checkout-net-val">0</span></div>
        <div id="qr-area" class="mx-auto w-48 h-48"></div>
        <div class="grid grid-cols-2 gap-4 mt-8">
            <button onclick="printBillReceipt()" class="py-5 bg-gray-800 text-white rounded-3xl font-black">🖨️ พิมพ์บิล</button>
            <button onclick="confirmCashPay()" class="py-5 bg-emerald-500 text-white rounded-3xl font-black">💵 รับเงินสด</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-admin-pin">
    <div class="modal-compact text-center">
        <h3 class="font-black text-3xl mb-6">Admin PIN</h3>
        <input id="pin-input" type="password" class="w-full text-5xl text-center font-black tracking-widest border-2 rounded-3xl p-6">
        <div class="flex gap-4 mt-8">
            <button onclick="closeModal('modal-admin-pin')" class="flex-1 py-5 bg-gray-200 font-black rounded-3xl">ยกเลิก</button>
            <button onclick="verifyPin()" class="flex-[2] py-5 bg-[#800000] text-white font-black rounded-3xl">ยืนยัน</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-pro">
    <div class="modal-compact text-center">
        <h3 class="text-4xl font-black text-orange-600 mb-4">Unlock Pro</h3>
        <div id="hwid-view" class="font-mono text-xl font-black bg-yellow-100 p-6 rounded-3xl"></div>
        <input id="license-input" placeholder="FK7-XXXX-XXXX-XXXX" class="w-full mt-6 p-6 text-xl font-mono tracking-widest border-2 rounded-3xl">
        <button onclick="verifyLicense()" class="w-full mt-6 py-6 bg-gray-900 text-white text-2xl font-black rounded-3xl">ปลดล็อค 🚀</button>
    </div>
</div>

<div class="modal-overlay" id="modal-sync">
    <div class="modal-compact text-center">
        <h3 class="font-black text-2xl mb-4">📱 Cloud Sync</h3>
        <div id="sync-qr-box" class="mx-auto"></div>
        <input id="sync-pin-input" placeholder="PIN" class="w-full mt-6 p-6 text-3xl font-black border-2 rounded-3xl text-center">
        <button onclick="authClientSync()" class="w-full mt-4 py-5 bg-blue-600 text-white rounded-3xl font-black">เชื่อมต่อเครื่องลูก</button>
    </div>
</div>

<div id="toast"></div>

<script>
// ==================== DB MASTER (เครื่องแม่) ====================
const INIT_DB = {
    shopName: "FAKDU", logo: "", theme: "#800000", adminPin: "admin",
    unitType: "โต๊ะ", unitCount: 4, isPro: false,
    ppay: "", qrOffline: "", syncKey: "SYNC" + Math.random().toString(36).substring(2,8).toUpperCase(),
    units: [], items: [], sales: [], carts: {}
};
let db = {...INIT_DB};
let isAdmin = false;
let activeId = null;

// ==================== BOOTSTRAP (Loading + F5 Safe) ====================
async function bootstrap() {
    document.getElementById('loading-screen').style.display = 'flex';
    
    const saved = localStorage.getItem('FAKDU_MASTER_V831');
    if (saved) db = {...INIT_DB, ...JSON.parse(saved)};
    
    if (db.units.length === 0) rebuildUnits(db.unitCount);
    if (!db.carts) db.carts = {};
    
    await new Promise(r => setTimeout(r, 1200));
    
    document.getElementById('hwid-view').innerText = await generateHWID();
    document.getElementById('loading-screen').style.display = 'none';
    
    updateUI();
    checkNet();
    startTime();
    renderAll();
}

// ==================== HWID + PRO ====================
async function generateHWID() {
    let id = localStorage.getItem('FAKDU_HWID_V831');
    if (!id) {
        const c = document.createElement('canvas');
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#800000'; ctx.fillRect(0,0,200,200);
        const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(c.toDataURL()));
        id = 'TB-' + Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,6).toUpperCase();
        localStorage.setItem('FAKDU_HWID_V831', id);
    }
    return id;
}
function verifyLicense() {
    const input = document.getElementById('license-input').value.trim();
    if (input.length > 8) {
        db.isPro = true; pushDB(); closeModal('modal-pro'); updateUI();
        showToast("👑 PRO เปิดแล้ว – ไม่จำกัด 4");
    }
}

// ==================== PUSH + RENDER ====================
function pushDB() {
    localStorage.setItem('FAKDU_MASTER_V831', JSON.stringify(db));
    renderAll();
}
function renderAll() {
    renderUnits();
    renderFIFO();
    renderAdminItems();
    renderDash();
}

// ==================== LIMIT 4 ====================
function checkLimit(type) {
    if (db.isPro) return true;
    if (type === 'unit' && db.unitCount >= 4) return false;
    if (type === 'menu' && db.items.length >= 4) return false;
    if (type === 'order' && (db.carts[activeId] || []).length >= 4) return false;
    return true;
}

// ==================== UNITS & ORDER (เครื่องแม่) ====================
function rebuildUnits(c) {
    db.units = [];
    for (let i = 1; i <= c; i++) db.units.push({id: i, orders: [], startTime: null});
}
function renderUnits() {
    const box = document.getElementById('grid-units');
    box.innerHTML = '';
    for (let i = 1; i <= db.unitCount; i++) {
        const u = db.units.find(x => x.id === i) || {id:i, orders:[]};
        let cls = u.orders.length > 0 ? 'unit-busy' : (db.carts[i] && db.carts[i].length > 0 ? 'unit-pending' : '');
        box.innerHTML += `<div class="unit-card ${cls}" onclick="openTable(${i})">${i}</div>`;
    }
}
function openTable(id) {
    activeId = id;
    document.getElementById('active-unit-id').innerText = id;
    if (!db.carts[id]) db.carts[id] = [];
    renderItemList();
    refreshCart();
    switchTab('order');
}

// ==================== ITEMS + CART ====================
function renderItemList() {
    const box = document.getElementById('item-grid');
    box.innerHTML = '';
    db.items.forEach(i => {
        box.innerHTML += `
            <div onclick="addToCart(${i.id})" class="bg-white text-black p-6 rounded-3xl flex justify-between shadow">
                <div class="font-black text-2xl">${i.name}</div>
                <div class="text-3xl font-black text-[#800000]">฿${i.price}</div>
            </div>`;
    });
}
function addToCart(id) {
    if (!checkLimit('order')) return showToast("⚠️ ฟรีจำกัด 4 รายการ");
    const cart = db.carts[activeId] || [];
    const item = db.items.find(x => x.id === id);
    let ex = cart.find(c => c.id === id);
    if (ex) { ex.qty++; ex.total = ex.qty * ex.price; } 
    else cart.push({id: item.id, name: item.name, price: item.price, qty: 1, total: item.price});
    db.carts[activeId] = cart;
    pushDB();
    refreshCart();
}
function refreshCart() {
    const cart = db.carts[activeId] || [];
    let t = cart.reduce((a,c) => a + c.total, 0);
    let q = cart.reduce((a,c) => a + c.qty, 0);
    document.getElementById('cart-total').innerText = t;
    document.getElementById('cart-count').innerText = q;
}

// ==================== REVIEW + SEND ====================
function reviewOrderNow() {
    const cart = db.carts[activeId] || [];
    if (!cart.length) return showToast("ตะกร้าว่าง");
    document.getElementById('review-id-view').innerText = activeId;
    let html = '', total = 0;
    cart.forEach((c, i) => {
        total += c.total;
        html += `<div class="flex justify-between py-3 border-b"><span>${c.name} ×${c.qty}</span><span>฿${c.total}</span></div>`;
    });
    document.getElementById('review-items-box').innerHTML = html;
    document.getElementById('review-total-val').innerText = total;
    document.getElementById('modal-review').style.display = 'flex';
}
function sendOrderToKitchen() {
    const u = db.units.find(x => x.id === activeId);
    u.orders = (u.orders || []).concat(db.carts[activeId] || []);
    if (!u.startTime) u.startTime = Date.now();
    db.carts[activeId] = [];
    pushDB();
    closeModal('modal-review');
    switchTab('customer');
    showToast("🚀 ส่งครัวแล้ว");
}

// ==================== CHECKOUT + FIFO ====================
function renderFIFO() {
    const box = document.getElementById('shop-queue-list');
    box.innerHTML = '';
    const active = db.units.filter(u => u.orders && u.orders.length > 0);
    active.sort((a,b) => (a.startTime||0) - (b.startTime||0));
    active.forEach(u => {
        const total = u.orders.reduce((s,o) => s + o.total, 0);
        const min = Math.floor((Date.now() - (u.startTime||0)) / 60000);
        box.innerHTML += `
            <div onclick="openCheckout(${u.id})" class="bg-white text-black p-6 rounded-3xl flex justify-between">
                <div><div class="font-black text-4xl">โต๊ะ ${u.id}</div><div class="text-xs text-gray-500">${min} นาที</div></div>
                <div class="text-right"><div class="text-3xl font-black">฿${total}</div></div>
            </div>`;
    });
}
function openCheckout(id) {
    activeId = id;
    const u = db.units.find(x => x.id === id);
    document.getElementById('checkout-id-view').innerText = id;
    let html = '', t = 0;
    u.orders.forEach(o => { t += o.total; html += `<div class="flex justify-between py-3"><span>${o.name} x${o.qty}</span><span>฿${o.total}</span></div>`; });
    document.getElementById('checkout-items-box').innerHTML = html;
    document.getElementById('checkout-net-val').innerText = t;
    
    const qrArea = document.getElementById('qr-area');
    qrArea.innerHTML = '';
    if (navigator.onLine && db.ppay) {
        new QRCode(qrArea, { text: `https://promptpay.io/${db.ppay}/${t}`, width: 180, height: 180 });
    } else if (db.qrOffline) {
        qrArea.innerHTML = `<img src="${db.qrOffline}" class="w-full rounded-2xl">`;
    }
    document.getElementById('modal-checkout').style.display = 'flex';
}
function confirmCashPay() {
    const u = db.units.find(x => x.id === activeId);
    const total = u.orders.reduce((s,o) => s + o.total, 0);
    db.sales.push({id: Date.now(), date: new Date().toISOString().slice(0,10), total, items: JSON.parse(JSON.stringify(u.orders))});
    u.orders = [];
    u.startTime = null;
    pushDB();
    closeModal('modal-checkout');
    showToast("✅ ชำระเงินสำเร็จ");
}

// ==================== DASH + MENU ====================
function renderDash() {
    let html = `<div class="grid grid-cols-3 gap-4">`;
    let today = 0;
    const td = new Date().toISOString().slice(0,10);
    db.sales.forEach(s => { if (s.date === td) today += s.total; });
    html += `<div class="bg-emerald-500 p-6 rounded-3xl text-white text-center"><div class="text-xs">วันนี้</div><div class="text-4xl font-black">฿${today}</div></div>`;
    html += `</div>`;
    document.getElementById('sub-dash').innerHTML = html;
}
function renderAdminItems() {
    const box = document.getElementById('sub-menu');
    box.innerHTML = `<button onclick="openMenuModal()" class="w-full bg-[#800000] py-5 rounded-3xl font-black text-xl mb-6">+ เพิ่มรายการ</button>`;
    db.items.forEach(i => {
        box.innerHTML += `
            <div class="bg-white p-6 rounded-3xl flex justify-between mb-4">
                <div><div class="font-black text-2xl">${i.name}</div><div class="text-xl text-[#800000]">฿${i.price}</div></div>
                <button onclick="deleteItem(${i.id});event.stopImmediatePropagation()" class="text-red-500 text-4xl">🗑️</button>
            </div>`;
    });
}
function openMenuModal() {
    if (!checkLimit('menu')) return showToast("⚠️ ฟรีจำกัด 4 เมนู");
    // สามารถเพิ่ม modal form ได้ในอนาคต
    const name = prompt("ชื่อรายการ");
    const price = parseInt(prompt("ราคา"));
    if (name && price) {
        db.items.push({id: Date.now(), name, price});
        pushDB();
        renderAdminItems();
    }
}
function deleteItem(id) {
    db.items = db.items.filter(x => x.id !== id);
    pushDB();
    renderAdminItems();
}

// ==================== NAV + UTILS ====================
function switchTab(id, el) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(`screen-${id}`).classList.remove('hidden');
    if (el) document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    if (el) el.classList.add('active');
}
function attemptAdmin(target, el) {
    if (isAdmin) return switchTab(target, el);
    document.getElementById('modal-admin-pin').style.display = 'flex';
}
function verifyPin() {
    const pin = document.getElementById('pin-input').value.trim();
    if (pin === db.adminPin || pin === "FAKDU-V7-ADMIN") {
        isAdmin = true;
        closeModal('modal-admin-pin');
        showToast("🔓 Admin Mode");
    }
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}
function updateUI() {
    document.getElementById('trial-badge').style.display = db.isPro ? 'none' : 'block';
}
function checkNet() {
    const dot = document.getElementById('status-dot');
    dot.className = navigator.onLine ? 'status-dot st-on' : 'status-dot st-off';
    if (navigator.onLine) {
        dot.classList.add('st-sync');
        setTimeout(() => dot.classList.remove('st-sync'), 10000);
    }
    setInterval(checkNet, 8000);
}

function saveSystemSettings() {
    db.shopName = document.getElementById('sys-shop-name').value || "FAKDU";
    pushDB();
    showToast("💾 บันทึกเรียบร้อย");
}
function openSyncModal() {
    document.getElementById('modal-sync').style.display = 'flex';
    const box = document.getElementById('sync-qr-box');
    box.innerHTML = '';
    new QRCode(box, { text: db.syncKey, width: 200, height: 200 });
}
function authClientSync() {
    showToast("✅ Sync Key: " + db.syncKey + " (ให้เครื่องลูกสแกน)");
    closeModal('modal-sync');
}
