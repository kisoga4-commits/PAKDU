<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAKDU v8.0 FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #800000; --bg: #f8fafc; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: 900; position: sticky; top: 0; z-index: 100; }
        .item-btn { border: 1px solid #e2e8f0; border-radius: 15px; padding: 10px; display: flex; align-items: center; gap: 10px; margin: 10px; cursor: pointer; }
        .item-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="shop-name">FAKDU LOADING...</div>
    <div id="item-grid" class="p-4">
        </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ### 2. ตั้งค่าข้อมูล (ใช้ var ทั้งหมดกัน Error ซ้ำ) ###
var db = {
    shopName: "ร้านของป๋า (FAKDU)",
    theme: "#800000",
    items: [
        { id: 1, name: "ข้าวกะเพราหมูสับ", price: 50, img: "https://img.freepik.com/free-photo/stir-fried-pork-basil-with-fried-egg-rice_1150-35322.jpg" },
        { id: 2, name: "ผัดไทยกุ้งสด", price: 70, img: "https://img.freepik.com/free-photo/pad-thai-white-plate_1150-11054.jpg" }
    ]
};

var firebaseConfig = {
    apiKey: "AIzaSyC4jOmVcZp0HmmDqZCmHufnq2yyoPcvyVM",
    authDomain: "pakdu-a26c4.firebaseapp.com",
    databaseURL: "https://pakdu-a26c4-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pakdu-a26c4",
    storageBucket: "pakdu-a26c4.firebasestorage.app",
    messagingSenderId: "414809008203",
    appId: "1:414809008203:web:757dceafa78d91900d85ce"
};

// ### 3. รันระบบ (เช็คขั้นบันได) ###
function initApp() {
    try {
        // เชื่อมต่อ Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log("✅ 1. Cloud Connected");
        }
        
        // อัปเดตหน้าจอ
        document.getElementById('shop-name').innerText = db.shopName;
        renderItems();
        console.log("✅ 2. UI Rendered");
    } catch (err) {
        console.error("❌ พังตรงนี้ป๋า:", err);
        alert("มีปัญหา: " + err.message);
    }
}

// ### 4. วาดรายการอาหาร (ใช้ Backtick ` ครอบ) ###
function renderItems() {
    const grid = document.getElementById('item-grid');
    grid.innerHTML = '';
    
    db.items.forEach(i => {
        // ใช้เครื่องหมาย ` (ปุ่มใต้ Esc) เท่านั้นนะครับป๋า
        grid.innerHTML += `
            <div class="item-btn" onclick="alert('สั่ง ${i.name}')">
                <img src="${i.img}" class="item-img" onerror="this.src='https://via.placeholder.com/60?text=Food'">
                <div class="flex-1">
                    <div class="font-bold text-gray-800">${i.name}</div>
                    <div class="text-red-800 font-bold">฿${i.price}</div>
                </div>
                <div class="text-2xl text-gray-300">+</div>
            </div>`;
    });
}

// ป้องกันกดปุ่ม F12
function ds(e) { if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74))||(e.ctrlKey&&e.keyCode==85)) return false; }
window.onkeydown = ds;

// เริ่มรัน
window.onload = initApp;
</script>

</body>
</html>
