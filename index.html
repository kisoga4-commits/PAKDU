<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAKDU v9.22 - Cloud Sync PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #800000; --bg: #f8fafc; }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg); display: flex; justify-content: center; height: 100dvh; margin: 0; user-select: none; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--bg); height: 100dvh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(0,0,0,0.4); }
        .screen { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .glass-header { background: var(--primary); color: white; position: sticky; top: 0; z-index: 50; height: 100px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .item-btn { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; margin-bottom: 10px; }
        .item-img { width: 65px; height: 65px; border-radius: 14px; object-fit: cover; background: #eee; }
        .theme-text { color: var(--primary) !important; }
        .theme-bg { background-color: var(--primary) !important; color: white !important; }
        #toast { visibility: hidden; min-width: 250px; background: #1e293b; color: #fff; text-align: center; border-radius: 16px; padding: 14px; position: fixed; z-index: 10000; left: 50%; bottom: 40px; transform: translateX(-50%); font-weight: 800; }
        #toast.show { visibility: visible; animation: fadein 0.4s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 24px; border-radius: 32px; width: 92%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-container">
    <div class="glass-header">
        <div class="flex items-center gap-3">
            <img id="shop-logo" src="https://via.placeholder.com/50" class="w-[50px] h-[50px] rounded-xl bg-white border-2 border-white">
            <h1 id="display-shop-name" class="font-black text-white text-xl">FAKDU</h1>
        </div>
        <div id="trial-badge" class="bg-yellow-400 text-black px-4 py-1 rounded-full text-[12px] font-black animate-pulse">รุ่นทดลอง</div>
    </div>

    <div id="screen-customer" class="screen active p-5">
        <div id="grid-units" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="screen-order" class="screen hidden bg-gray-50 p-4">
        <button onclick="switchTab('customer')" class="mb-4 font-black text-gray-400">← กลับ</button>
        <h2 class="text-2xl font-black mb-4 theme-text">โต๊ะ <span id="active-unit-id">0</span></h2>
        <div id="item-list" class="space-y-3"></div>
        <div class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white p-5 shadow-2xl rounded-t-[30px] flex justify-between items-center">
            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase">ยอดรวม</p>
                <p class="text-3xl font-black theme-text">฿<span id="cart-total">0</span></p>
            </div>
            <button onclick="confirmOrder()" class="theme-bg px-10 py-4 rounded-2xl font-black shadow-lg">ส่งออร์เดอร์ 🚀</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ### 2. ENGINE 9.22 (แก้ชื่อซ้ำและ Backtick) ###
var db = {
    shopName: "FAKDU SHOP",
    syncKey: "G9X2W1", // ปรับให้ตรงกับ Cloud ของป๋า
    items: [
        {id: 1, name: "ข้าวกะเพราหมูสับ", price: 50, img: "https://img.freepik.com/free-photo/stir-fried-pork-basil-with-fried-egg-rice_1150-35322.jpg"},
        {id: 2, name: "ผัดไทยกุ้งสด", price: 65, img: "https://img.freepik.com/free-photo/pad-thai-white-plate_1150-11054.jpg"}
    ],
    units: []
};
var cart = [];
var activeUnitId = null;

var firebaseConfig = {
    apiKey: "AIzaSyC4jOmVcZp0HmmDqZCmHufnq2yyoPcvyVM",
    authDomain: "pakdu-a26c4.firebaseapp.com",
    databaseURL: "https://pakdu-a26c4-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pakdu-a26c4",
    storageBucket: "pakdu-a26c4.firebasestorage.app",
    messagingSenderId: "414809008203",
    appId: "1:414809008203:web:757dceafa78d91900d85ce"
};

// ### 3. ฟังก์ชันแก้จุดตาย (Backtick ` ) ###
function renderItemList() {
    const box = document.getElementById('item-list');
    box.innerHTML = '';
    db.items.forEach(i => {
        // ใช้เครื่องหมาย ` (ใต้ปุ่ม Esc) แก้ปัญหา 404
        box.innerHTML += `
            <div class="item-btn" onclick="addToCart(${i.id})">
                <img src="${i.img}" class="item-img" onerror="this.src='https://via.placeholder.com/65?text=Food'">
                <div class="flex-1 text-left">
                    <div class="font-black text-gray-800 text-lg">${i.name}</div>
                    <div class="theme-text font-black">฿${i.price}</div>
                </div>
                <div class="text-3xl text-gray-300 font-black">+</div>
            </div>`;
    });
}

function renderCustomerGrid() {
    const grid = document.getElementById('grid-units');
    grid.innerHTML = '';
    for(let i=1; i<=8; i++) {
        grid.innerHTML += `<div class="unit-card border-2 p-10 rounded-3xl flex items-center justify-center bg-white" onclick="openOrder(${i})">
            <span class="text-4xl font-black text-gray-300">${i}</span>
        </div>`;
    }
}

function openOrder(id) {
    activeUnitId = id; cart = [];
    document.getElementById('active-unit-id').innerText = id;
    renderItemList(); updateCartUI(); switchTab('order');
}

function addToCart(id) {
    const item = db.items.find(x => x.id === id);
    cart.push(item); updateCartUI();
    showToast(`เพิ่ม ${item.name} แล้ว`);
}

function updateCartUI() {
    const total = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('cart-total').innerText = total.toLocaleString();
}

function confirmOrder() {
    if(cart.length === 0) return showToast("ตะกร้าว่าง!", "error");
    showToast("🚀 ส่งออร์เดอร์สำเร็จ!", "success");
    setTimeout(() => switchTab('customer'), 1000);
}

// ### 4. ระบบล้างแคชอัตโนมัติ (Force Update) ###
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
            reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        console.log('🚀 พบเวอร์ชันใหม่! กำลังอัปเดต...');
                        location.reload(); 
                    }
                };
            };
        });
    });
}

// Helpers
function switchTab(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(`screen-${id}`).classList.remove('hidden');
}
function showToast(m, type='success') {
    const el = document.getElementById("toast");
    el.innerText = m; el.className = "show";
    el.style.background = type === 'error' ? '#ef4444' : '#1e293b';
    setTimeout(() => el.className = "", 2500);
}

window.onload = () => {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    renderCustomerGrid();
};
</script>
</body>
</html>
