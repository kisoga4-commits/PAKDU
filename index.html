<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAKDU v9.22 - FULL SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #800000; --bg: #f8fafc; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.2); }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: 900; position: sticky; top: 0; z-index: 50; }
        .item-btn { border: 1px solid #eee; border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 15px; margin: 10px; cursor: pointer; }
        .item-img { width: 65px; height: 65px; border-radius: 14px; object-fit: cover; background: #f0f0f0; }
        .theme-text { color: var(--primary); }
        #toast { visibility: hidden; min-width: 250px; background: #1e293b; color: white; text-align: center; border-radius: 15px; padding: 15px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 700; }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="shop-name-display">FAKDU MASTER</div>
    <div id="item-grid" class="p-4 space-y-3">
        </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ### 2. ข้อมูลระบบ (ใช้ var กัน Error ซ้ำ) ###
var db = {
    shopName: "ร้านของป๋า FAKDU",
    theme: "#800000",
    items: [
        { id: 1, name: "ข้าวกะเพราหมูสับ", price: 50, img: "https://img.freepik.com/free-photo/stir-fried-pork-basil-with-fried-egg-rice_1150-35322.jpg" },
        { id: 2, name: "ผัดไทยกุ้งสด", price: 70, img: "https://img.freepik.com/free-photo/pad-thai-white-plate_1150-11054.jpg" }
    ]
};

var firebaseConfig = {
    apiKey: "AIzaSyC4jOmVcZp0HmmDqZCmHufnq2yyoPcvyVM",
    authDomain: "pakdu-a26c4.firebaseapp.com",
    databaseURL: "https://pakdu-a26c4-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pakdu-a26c4",
    storageBucket: "pakdu-a26c4.firebasestorage.app",
    messagingSenderId: "414809008203",
    appId: "1:414809008203:web:757dceafa78d91900d85ce"
};

// ### 3. ฟังก์ชันหลัก (แก้จุดพังเรื่องรูปแล้ว) ###
function renderItemButtons() {
    const grid = document.getElementById('item-grid');
    grid.innerHTML = '';
    
    db.items.forEach(i => {
        // ใช้ Backtick ` (ปุ่มใต้ Esc) เพื่อให้รูปไม่ขึ้น 404
        grid.innerHTML += `
            <div class="item-btn" onclick="showToast('สั่ง ${i.name} แล้ว!')">
                <img src="${i.img}" class="item-img" onerror="this.src='https://via.placeholder.com/65?text=Food'">
                <div class="flex-1">
                    <div class="font-black text-gray-800">${i.name}</div>
                    <div class="theme-text font-black">฿${i.price}</div>
                </div>
                <div class="bg-gray-50 w-10 h-10 rounded-xl flex items-center justify-center font-black text-xl text-gray-400 border">+</div>
            </div>`;
    });
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.className = "show";
    setTimeout(() => t.className = "", 2000);
}

function initApp() {
    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        document.getElementById('shop-name-display').innerText = db.shopName;
        renderItemButtons();
        console.log("✅ FAKDU System Ready!");
    } catch (e) { console.error("Firebase Error", e); }
}

// ### 4. ระบบล้างแคชอัตโนมัติ (Force Update) ###
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
            reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        console.log('🚀 พบเวอร์ชันใหม่! กำลังอัปเดต...');
                        location.reload(); 
                    }
                };
            };
        });
    });
}

window.onload = initApp;
</script>
</body>
</html>
